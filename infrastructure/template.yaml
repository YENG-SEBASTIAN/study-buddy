AWSTemplateFormatVersion: "2010-09-09"
Description: AWS Exam Study Buddy - RAG backend

Parameters:
  KnowledgeBaseId:
    Type: String
    Description: ID of your existing Bedrock Knowledge Base

  AnthropicModel:
    Type: String
    Description: Claude model ID used for generation
    Default: claude-haiku-4-5-20251001

  AnthropicSecretName:
    Type: String
    Description: Secrets Manager secret name holding the Anthropic API key
    Default: study-buddy/anthropic-api-key

Resources:
  # Lambda execution role: CloudWatch logs + Bedrock/DynamoDB/S3 access.
  StudyBuddyFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: BedrockRagAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - bedrock:Retrieve
                Resource: "*"
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:Query
                Resource: !GetAtt ChatHistoryTable.Arn
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub "${StudyNotesBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${AnthropicSecretName}-*"

  # Single Lambda backing every route (POST /ask, GET /history, POST /upload).
  StudyBuddyFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-ask"
      Runtime: python3.12
      Handler: lambda_function.handler
      Role: !GetAtt StudyBuddyFunctionRole.Arn
      Timeout: 60
      MemorySize: 256
      Code: ../backend/
      Environment:
        Variables:
          KNOWLEDGE_BASE_ID: !Ref KnowledgeBaseId
          ANTHROPIC_MODEL: !Ref AnthropicModel
          ANTHROPIC_SECRET_NAME: !Ref AnthropicSecretName
          CHAT_HISTORY_TABLE: !Ref ChatHistoryTable
          STUDY_NOTES_BUCKET: !Ref StudyNotesBucket

  # Auto-confirms every sign-up so no verification code is required.
  PreSignUpTriggerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  PreSignUpTriggerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${AWS::StackName}-pre-signup"
      Runtime: python3.12
      Handler: pre_signup.handler
      Role: !GetAtt PreSignUpTriggerRole.Arn
      Timeout: 10
      Code: ../backend/

  PreSignUpInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref PreSignUpTriggerFunction
      Principal: cognito-idp.amazonaws.com
      SourceArn: !GetAtt StudyBuddyUserPool.Arn

  # User directory - sign-in happens via the Hosted UI domain below.
  StudyBuddyUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${AWS::StackName}-users"
      UsernameAttributes:
        - email
      LambdaConfig:
        PreSignUp: !GetAtt PreSignUpTriggerFunction.Arn
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false

  # Public SPA client - no secret, PKCE-secured Authorization Code grant.
  StudyBuddyUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref StudyBuddyUserPool
      ClientName: !Sub "${AWS::StackName}-web"
      AllowedOAuthFlows:
        - code
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthScopes:
        - openid
        - email
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - http://localhost:3000/auth/callback
        - https://akosua-ai.vercel.app/auth/callback
      LogoutURLs:
        - http://localhost:3000/
        - https://akosua-ai.vercel.app/
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      PreventUserExistenceErrors: ENABLED

  # Hosted UI login page: https://<prefix>.auth.<region>.amazoncognito.com
  StudyBuddyUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      UserPoolId: !Ref StudyBuddyUserPool
      Domain: !Sub "${AWS::StackName}-${AWS::AccountId}"

  # Per-user chat history: userId (partition key) + timestamp (sort key).
  ChatHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${AWS::StackName}-chat-history"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: timestamp
          KeyType: RANGE

  # Study-note uploads via presigned URL (see handle_upload in lambda_function.py).
  StudyNotesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - http://localhost:3000
              - https://akosua-ai.vercel.app
            AllowedMethods:
              - PUT
            AllowedHeaders:
              - "*"

  # HTTP API (v2). CORS allows the Next.js dev origin, incl. Authorization header.
  StudyBuddyHttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub "${AWS::StackName}-api"
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - http://localhost:3000
          - https://akosua-ai.vercel.app
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization

  # AWS_PROXY integration shared by all three routes - one Lambda, dispatched
  # internally on event["routeKey"].
  LambdaIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref StudyBuddyHttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt StudyBuddyFunction.Arn
      PayloadFormatVersion: "2.0"

  # Validates the Cognito JWT on every protected route before Lambda runs.
  CognitoAuthorizer:
    Type: AWS::ApiGatewayV2::Authorizer
    Properties:
      ApiId: !Ref StudyBuddyHttpApi
      AuthorizerType: JWT
      IdentitySource:
        - "$request.header.Authorization"
      Name: CognitoAuthorizer
      JwtConfiguration:
        Audience:
          - !Ref StudyBuddyUserPoolClient
        Issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${StudyBuddyUserPool}"

  AskRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref StudyBuddyHttpApi
      RouteKey: "POST /ask"
      Target: !Sub "integrations/${LambdaIntegration}"
      AuthorizationType: JWT
      AuthorizerId: !Ref CognitoAuthorizer

  HistoryRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref StudyBuddyHttpApi
      RouteKey: "GET /history"
      Target: !Sub "integrations/${LambdaIntegration}"
      AuthorizationType: JWT
      AuthorizerId: !Ref CognitoAuthorizer

  UploadRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref StudyBuddyHttpApi
      RouteKey: "POST /upload"
      Target: !Sub "integrations/${LambdaIntegration}"
      AuthorizationType: JWT
      AuthorizerId: !Ref CognitoAuthorizer

  # $default stage auto-deploys route changes - no separate deploy step needed.
  StudyBuddyStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref StudyBuddyHttpApi
      StageName: "$default"
      AutoDeploy: true

  # Grants API Gateway permission to invoke the Lambda.
  ApiGatewayInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref StudyBuddyFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${StudyBuddyHttpApi}/*/*"

Outputs:
  ApiEndpoint:
    Description: Base invoke URL (append /ask, /history, /upload)
    Value: !Sub "https://${StudyBuddyHttpApi}.execute-api.${AWS::Region}.amazonaws.com"

  LambdaFunctionName:
    Description: Name of the deployed Lambda function
    Value: !Ref StudyBuddyFunction

  CognitoUserPoolId:
    Description: User Pool ID
    Value: !Ref StudyBuddyUserPool

  CognitoUserPoolClientId:
    Description: For NEXT_PUBLIC_COGNITO_CLIENT_ID
    Value: !Ref StudyBuddyUserPoolClient

  CognitoHostedUIDomain:
    Description: For NEXT_PUBLIC_COGNITO_DOMAIN
    Value: !Sub "https://${StudyBuddyUserPoolDomain}.auth.${AWS::Region}.amazoncognito.com"

  ChatHistoryTableName:
    Description: DynamoDB table storing per-user chat history
    Value: !Ref ChatHistoryTable

  StudyNotesBucketName:
    Description: S3 bucket for uploaded study notes
    Value: !Ref StudyNotesBucket
